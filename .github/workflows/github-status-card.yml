name: GitHub Status Card

on:
  schedule:
    - cron: "*/30 * * * *"

  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: |
          npm init -y
          npm install playwright

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Generate SVG
        run: node scripts/generate-status-card.js

      - name: Show files
        run: ls -la

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add github-status-card.svg

          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "update github status card"
          git push
